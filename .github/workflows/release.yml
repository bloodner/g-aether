name: Release

on:
  release:
    types: [ published ]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: windows-2022
    env:
      PUBLISH_DIR: app/GHelper.WPF/bin/Release/net8.0-windows/win-x64/publish
      EXE_NAME: G-Aether.exe
    steps:
    - uses: actions/checkout@v4
    - name: Setup dotnet
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Publish
      run: dotnet publish app/GHelper.WPF/GHelper.WPF.csproj --configuration Release --runtime win-x64 -p:PublishSingleFile=true --no-self-contained

    - name: Stage output
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path ./artifact | Out-Null
        Copy-Item "$env:PUBLISH_DIR/$env:EXE_NAME" ./artifact/ -Force

    - name: Upload unsigned EXE (for SignPath)
      id: upload-unsigned
      uses: actions/upload-artifact@v4
      with:
        name: unsigned-exe
        path: ./artifact/${{ env.EXE_NAME }}

    - name: Check for SignPath credentials
      id: signing-check
      shell: pwsh
      run: |
        $hasSecrets = -not [string]::IsNullOrEmpty("${{ secrets.SIGNPATH_API_TOKEN }}")
        "enabled=$($hasSecrets.ToString().ToLower())" | Out-File $env:GITHUB_OUTPUT -Append
        if ($hasSecrets) { Write-Host "SignPath credentials detected - will sign." }
        else { Write-Host "SignPath credentials not set - uploading unsigned." }

    - name: Sign EXE via SignPath
      if: steps.signing-check.outputs.enabled == 'true'
      uses: signpath/github-action-submit-signing-request@v1.1
      with:
        api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
        organization-id: ${{ secrets.SIGNPATH_ORG_ID }}
        project-slug: ${{ secrets.SIGNPATH_PROJECT }}
        signing-policy-slug: ${{ secrets.SIGNPATH_POLICY }}
        github-artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}
        wait-for-completion: true
        output-artifact-directory: ./signed

    - name: Assemble release assets
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path ./release | Out-Null
        if ("${{ steps.signing-check.outputs.enabled }}" -eq "true") {
          Copy-Item "./signed/$env:EXE_NAME" ./release/ -Force
        } else {
          Copy-Item "./artifact/$env:EXE_NAME" ./release/ -Force
        }
        Compress-Archive -Path "./release/$env:EXE_NAME" -DestinationPath "./release/G-Aether.zip" -Force

    - name: Upload to GitHub release
      env:
        GH_TOKEN: ${{ github.token }}
      shell: pwsh
      run: gh release upload "${{ github.event.release.tag_name }}" "./release/$env:EXE_NAME" ./release/G-Aether.zip --clobber

    - name: Generate SLSA build provenance attestation
      uses: actions/attest-build-provenance@v2
      with:
        subject-path: |
          ./release/${{ env.EXE_NAME }}
          ./release/G-Aether.zip
